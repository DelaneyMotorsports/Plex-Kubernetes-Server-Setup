apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
  labels:
    app.kubernetes.io/name: sonarr
    app.kubernetes.io/part-of: media-stack
    app.kubernetes.io/component: pvr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
        app.kubernetes.io/part-of: media-stack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: sonarr
        image: lscr.io/linuxserver/sonarr:latest
        envFrom:
        - configMapRef:
            name: media-stack-config
        ports:
        - name: http
          containerPort: 8989
        volumeMounts:
        - name: config
          mountPath: /config
        - name: media
          mountPath: /media
        - name: downloads
          mountPath: /downloads
        startupProbe:
          httpGet:
            path: /ping
            port: 8989
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /ping
            port: 8989
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: 8989
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "384Mi"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: sonarr-config-pvc
      - name: media
        persistentVolumeClaim:
          claimName: media-library-pvc
      - name: downloads
        persistentVolumeClaim:
          claimName: downloads-pvc

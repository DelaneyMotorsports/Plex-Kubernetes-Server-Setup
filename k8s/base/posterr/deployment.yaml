apiVersion: apps/v1
kind: Deployment
metadata:
  name: posterr
  namespace: media
  labels:
    app.kubernetes.io/name: posterr
    app.kubernetes.io/part-of: media-stack
    app.kubernetes.io/component: display
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: posterr
  template:
    metadata:
      labels:
        app: posterr
        app.kubernetes.io/part-of: media-stack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: posterr
        image: petersem/posterr:latest
        envFrom:
        - configMapRef:
            name: media-stack-config
        ports:
        - name: http
          containerPort: 3000
        volumeMounts:
        - name: config
          mountPath: /app/config
        startupProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: posterr-config-pvc

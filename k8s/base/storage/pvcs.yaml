# Shared data PVCs (bind to the manually-created media-local PVs)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library-pvc
  namespace: media
  labels:
    app.kubernetes.io/part-of: media-stack
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: media-local
  volumeName: media-library-pv
  resources:
    requests:
      storage: 2Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: downloads-pvc
  namespace: media
  labels:
    app.kubernetes.io/part-of: media-stack
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: media-local
  volumeName: downloads-pv
  resources:
    requests:
      storage: 500Gi
---

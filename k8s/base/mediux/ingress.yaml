apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediux-ingress
  namespace: media
spec:
  ingressClassName: nginx
  rules:
  - host: mediux.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mediux
            port:
              number: 80

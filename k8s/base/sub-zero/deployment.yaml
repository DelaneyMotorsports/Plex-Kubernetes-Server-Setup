apiVersion: apps/v1
kind: Deployment
metadata:
  name: sub-zero
  namespace: media
  labels:
    app.kubernetes.io/name: sub-zero
    app.kubernetes.io/part-of: media-stack
    app.kubernetes.io/component: subtitles
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sub-zero
  template:
    metadata:
      labels:
        app: sub-zero
        app.kubernetes.io/part-of: media-stack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: sub-zero
        image: ghcr.io/pannal/sub-zero:latest
        envFrom:
        - configMapRef:
            name: media-stack-config
        ports:
        - name: http
          containerPort: 5000
        volumeMounts:
        - name: config
          mountPath: /config
        - name: media
          mountPath: /media
        startupProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: sub-zero-config-pvc
      - name: media
        persistentVolumeClaim:
          claimName: media-library-pvc

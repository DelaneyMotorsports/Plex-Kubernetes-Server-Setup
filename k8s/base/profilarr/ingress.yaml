apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: profilarr-ingress
  namespace: media
spec:
  ingressClassName: nginx
  rules:
  - host: profilarr.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: profilarr
            port:
              number: 6868

apiVersion: apps/v1
kind: Deployment
metadata:
  name: profilarr
  namespace: media
  labels:
    app.kubernetes.io/name: profilarr
    app.kubernetes.io/part-of: media-stack
    app.kubernetes.io/component: config-sync
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: profilarr
  template:
    metadata:
      labels:
        app: profilarr
        app.kubernetes.io/part-of: media-stack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: profilarr
        image: ghcr.io/dictionarry-hub/profilarr:latest
        envFrom:
        - configMapRef:
            name: media-stack-config
        ports:
        - name: http
          containerPort: 6868
        volumeMounts:
        - name: config
          mountPath: /config
        startupProbe:
          httpGet:
            path: /
            port: 6868
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /
            port: 6868
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 6868
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: profilarr-config-pvc

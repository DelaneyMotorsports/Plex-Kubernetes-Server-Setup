apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
  labels:
    app.kubernetes.io/name: prowlarr
    app.kubernetes.io/part-of: media-stack
    app.kubernetes.io/component: indexer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
        app.kubernetes.io/part-of: media-stack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: prowlarr
        image: lscr.io/linuxserver/prowlarr:latest
        envFrom:
        - configMapRef:
            name: media-stack-config
        ports:
        - name: http
          containerPort: 9696
        volumeMounts:
        - name: config
          mountPath: /config
        startupProbe:
          httpGet:
            path: /ping
            port: 9696
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /ping
            port: 9696
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: 9696
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: prowlarr-config-pvc

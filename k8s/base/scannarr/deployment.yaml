apiVersion: apps/v1
kind: Deployment
metadata:
  name: scannarr
  namespace: media
  labels:
    app.kubernetes.io/name: scannarr
    app.kubernetes.io/part-of: media-stack
    app.kubernetes.io/component: scanner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scannarr
  template:
    metadata:
      labels:
        app: scannarr
        app.kubernetes.io/part-of: media-stack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: scannarr
        image: ghcr.io/scannarr/scannarr:latest
        envFrom:
        - configMapRef:
            name: media-stack-config
        ports:
        - name: http
          containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /config
        startupProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: scannarr-config-pvc
